name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish Lfmt.NetRunner -c Release -o publish

      - name: Package
        run: tar -czf netrunner-linux-x64.tar.gz -C publish .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: netrunner-linux-x64.tar.gz
          generate_release_notes: true
